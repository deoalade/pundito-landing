  <script>
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxuItHuNjXQCVtL8SB4fu3DSt-QAzTUjErUWOpISO4OpxrEEPu47ibGVhYyqkBheWEoPA/exec';
    function handleSubmit(e) {
      e.preventDefault();
      var form = document.getElementById('email-form');
      var btn = form.querySelector('button');
      var input = form.querySelector('input');
      var email = input.value.trim();
      btn.textContent = '...';
      btn.disabled = true;
      fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email }) })
      .then(function() { form.style.display = 'none'; document.getElementById('success-msg').style.display = 'block'; })
      .catch(function() { form.style.display = 'none'; document.getElementById('success-msg').style.display = 'block'; });
    }
  </script>
